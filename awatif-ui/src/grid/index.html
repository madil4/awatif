<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Awatif UI - Grid</title>
    <script type="module" lang="ts">
      import van from "vanjs-core";
      import { grid } from "./grid";

      const fields2D = [
        {
          field: "A",
          text: "X-coordinate",
          editable: { type: "float" },
        },
        {
          field: "B",
          text: "Y-coordinate",
          editable: { type: "float" },
        },
        {
          field: "C",
          text: "Z-coordinate",
          editable: { type: "float" },
        },
      ];
      const data2D = van.state([
        [0, 0, 0],
        [1, 2, 3],
        [3, 4, 1],
      ]);

      const gridElm2D = grid(
        fields2D,
        data2D,
        (e) => console.log(e) // test on change
      );

      setTimeout(() => (data2D.val = [[0, 0, 0]]), 3000); // test on data change

      gridElm2D.style.height = "250px";

      document.body.appendChild(gridElm2D);

      const fields1D = [
        {
          field: "xPosition",
          text: "X-Position",
        },
        {
          field: "zPosition",
          text: "Z-Position",
        },
      ];
      const data1D = van.state({
        xPosition: 600,
        zPosition: 0,
      });

      const gridElm1D = grid(fields1D, data1D);

      gridElm1D.style.height = "250px";
      gridElm1D.style.top = "260px";

      document.body.appendChild(gridElm1D);
    </script>
  </head>
  <body></body>
</html>
